                focus: "Reviewing Lesson 13 (Harder Factorising) and preparing for the test.",
                questions: [
                    { diff: "Extremely Easy", q: "Factorise $2x + 4$", a: "$2(x + 2)$" },
                    { diff: "Very Easy", q: "Factorise $4x^2y + 10xy^2$", a: "$2xy(2x + 5y)$" },
                    { diff: "Easy", q: "Factorise $6ab - 3a^2b^2$", a: "$3ab(2 - ab)$" },
                    { diff: "Easy", q: "Factorise $2x^2y + 5xy$", a: "$xy(2x + 5)$" },
                    { diff: "Building Confidence", q: "Factorise $abc^2 - a^2c$", a: "$ac(bc - a)$" },
                    { diff: "Progressively Harder", q: "Factorise $14de^4 - 21d^2e^2$", a: "$7de^2(2e^2 - 3d)$" },
                    { diff: "Harder", q: "Factorise $33f^3g^2 + 11f^2g$", a: "$11f^2g(3fg + 1)$" },
                    { diff: "Harder", q: "Factorise $5x^5y^2 + 3x^2y$", a: "$x^2y(5x^3y + 3)$" },
                    { diff: "Hardest HW Review", q: "Factorise $45pqr^2 - 25p^3qr$", a: "$5pqr(9r - 5p^2)$" },
                    { diff: "Current Lesson Intro", q: "Write an expression for \"a number is added to two and then multiplied by 4\"", a: "$4(x + 2)$" }
                ]
            }
        };

        let allRevealed = false;

        // Timer Variables
        let timeLeft = 600; // 10 minutes in seconds
        let timerInterval = null;
        let isTimerRunning = false;

        function updateTimerDisplay() {
            const display = document.getElementById('time-display');
            if (timeLeft <= 0) {
                display.innerText = "00:00";
                display.classList.add('time-up');
                return;
            }
            display.classList.remove('time-up');
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('play-pause-btn');
            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
                btn.innerText = "▶️";
            } else {
                if (timeLeft <= 0) return;
                isTimerRunning = true;
                btn.innerText = "⏸️";
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                        btn.innerText = "▶️";
                    }
                }, 1000);
            }
        }

        function addMinute() {
            timeLeft += 60;
            updateTimerDisplay();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isTimerRunning = false;
            timeLeft = 600;
            document.getElementById('play-pause-btn').innerText = "▶️";
            updateTimerDisplay();
        }

        function setDate() {
            const today = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            
            document.getElementById('current-date').innerText = 
                `${days[today.getDay()]} ${today.getDate()} ${months[today.getMonth()]}`;
        }

        function loadLesson() {
            const select = document.getElementById('lesson-select');
            const data = lessonData[select.value];
            
            document.getElementById('focus-banner').innerHTML = `<strong>Focus:</strong> ${data.focus}`;
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            allRevealed = false;

            data.questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => toggleCard(card);
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <span class="q-number">Q${index + 1}</span>
                            <span class="diff-badge">${q.diff}</span>
                            <div class="math-content">${q.q}</div>
                        </div>
                        <div class="card-back">
                            <span class="q-number">Q${index + 1}</span>
                            <span class="diff-badge">Answer</span>
                            <div class="math-content">${q.a}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Re-render MathJax to ensure formulas format correctly
            if (window.MathJax) {
                MathJax.typesetPromise([grid]).catch((err) => console.log(err.message));
            }
        }

        function toggleCard(cardElement) {
            cardElement.classList.toggle('flipped');
        }

        function toggleAll() {
            const cards = document.querySelectorAll('.card');
            allRevealed = !allRevealed;
            cards.forEach(card => {
                if (allRevealed) {
                    card.classList.add('flipped');
                } else {
                    card.classList.remove('flipped');
                }
            });
        }

        window.onload = () => {
            setDate();
            updateTimerDisplay();
            loadLesson();
        };
    </script>
</body>
</html>
